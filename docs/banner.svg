  <rect x="48" y="128" width="700" height="3" rx="1.5" fill="url(#rule)"/>

  <text x="48" y="162" font-family="Cascadia Mono, Consolas, monospace" font-size="15">
    <tspan fill="#bc8cff">Gemini agent</tspan>
    <tspan fill="#6e7681"> ─▶ </tspan>
    <tspan fill="#58a6ff">Gateway</tspan>
    <tspan fill="#6e7681"> ─▶ </tspan>
    <tspan fill="#3fb950">PolicyEngine</tspan>
    <tspan fill="#6e7681"> ─▶ </tspan>
    <tspan fill="#d29922">approve / deny</tspan>
    <tspan fill="#6e7681"> ─▶ </tspan>
    <tspan fill="#39c5cf">MCP tools</tspan>
  </text>

  <text x="48" y="184" font-family="Cascadia Mono, Consolas, monospace" font-size="12" fill="#6e7681">FastAPI · Gemini · MCP · React · SQLite — 51 tests, zero paths around the gateway</text>
