<svg width="880" height="200" viewBox="0 0 880 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#101725"/>
      <stop offset="100%" stop-color="#0d1421"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <rect width="880" height="200" fill="url(#bg)"/>

  <!-- shield watermark motif, right side -->
  <g transform="translate(760, 30)" opacity="0.16">
    <path d="M50 0 L100 22 L100 70 Q100 118 50 140 Q0 118 0 70 L0 22 Z"
