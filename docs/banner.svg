    <path d="M30 68 L45 84 L72 48" fill="none" stroke="#3fb950" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- faint grid dots, left -->
  <g fill="#58a6ff" opacity="0.10">
    <circle cx="30" cy="30" r="2"/><circle cx="60" cy="30" r="2"/><circle cx="90" cy="30" r="2"/>
    <circle cx="30" cy="55" r="2"/><circle cx="60" cy="55" r="2"/>
    <circle cx="30" cy="80" r="2"/>
  </g>

  <text x="48" y="78" font-family="Segoe UI, Helvetica, Arial, sans-serif"
